<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON VAULT | ANIME</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="bg-glow"></div>
    
    <nav class="glass-nav">
        <h1 class="logo">NEON<span>VAULT</span></h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search 70,000+ Anime...">
            <div class="glow-line"></div>
        </div>
    </nav>

    <main class="anime-Grid" id="animeGrid">
        <!-- AI-Generated Anime Cards go here -->
    </main>

    <!-- Techy Video Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content glass">
            <span class="close-btn">&times;</span>
            <iframe id="videoIframe" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
